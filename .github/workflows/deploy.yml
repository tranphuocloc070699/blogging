name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Send Discord notification - Starting deployment
        if: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🚀 Deployment Started",
                "description": "Deploying to VPS...",
                "color": 3447003,
                "fields": [
                  {"name": "Branch", "value": "'"${{ github.ref_name }}"'", "inline": true},
                  {"name": "Commit", "value": "'"${GITHUB_SHA:0:7}"'", "inline": true},
                  {"name": "Author", "value": "'"${{ github.actor }}"'", "inline": true}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Deploy to VPS
        id: deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/blogging
            git pull origin main || git pull origin master

            # Build and restart containers
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d

            # Run Prisma migrations
            docker-compose exec -T app npx prisma migrate deploy

            # Create MinIO bucket if it doesn't exist
            docker-compose exec -T minio mc alias set local http://localhost:9000 admin password123
            docker-compose exec -T minio mc mb local/blogging --ignore-existing
            docker-compose exec -T minio mc anonymous set download local/blogging

            # Cleanup old images
            docker image prune -f

      - name: Send Discord notification - Success
        if: success() && secrets.DISCORD_WEBHOOK_URL
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Deployment Successful",
                "description": "Application deployed successfully to VPS!",
                "color": 3066993,
                "fields": [
                  {"name": "Branch", "value": "'"${{ github.ref_name }}"'", "inline": true},
                  {"name": "Commit", "value": "'"${GITHUB_SHA:0:7}"'", "inline": true},
                  {"name": "Author", "value": "'"${{ github.actor }}"'", "inline": true},
                  {"name": "Duration", "value": "'"${{ job.duration }}"'", "inline": true}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Send Discord notification - Failure
        if: failure() && secrets.DISCORD_WEBHOOK_URL
        run: |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "❌ Deployment Failed",
                "description": "Deployment to VPS failed! Please check the logs.",
                "color": 15158332,
                "fields": [
                  {"name": "Branch", "value": "'"${{ github.ref_name }}"'", "inline": true},
                  {"name": "Commit", "value": "'"${GITHUB_SHA:0:7}"'", "inline": true},
                  {"name": "Author", "value": "'"${{ github.actor }}"'", "inline": true},
                  {"name": "Workflow", "value": "[View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"'"
              }]
            }' \
            ${{ secrets.DISCORD_WEBHOOK_URL }}
