version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-blog
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog-user} -d ${POSTGRES_DB:-blog}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - blog-network

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - blog-network

  app:
    image: ghcr.io/${GITHUB_USERNAME}/blogging:latest
    container_name: blog-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Running Prisma migrations...' &&
      npx prisma migrate deploy &&
      echo 'Generating Prisma client...' &&
      npx prisma generate &&
      echo 'Starting Next.js app...' &&
      npm run start
      "
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - blog-network

volumes:
  postgres_data:
  minio_data:

networks:
  blog-network:
    driver: bridge
